server:
  port: 9000

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gaiadb
    username: gaia
    password: gaia
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none         # Flyway로 스키마 관리, Hibernate 검증 비활성화
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true
        jdbc.fetch_size: 50
        query.in_clause_parameter_padding: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
#    clean-disabled: false

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
